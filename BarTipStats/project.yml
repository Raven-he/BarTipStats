name: BarTipStats
options:
  bundleIdPrefix: com.bartipstats
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  BarTipStats:
    type: application
    platform: iOS
    sources:
      - App
      - Models
      - ViewModels
      - path: Views
        type: group
      - Services
      - Extensions
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bartipstats.app
        INFOPLIST_FILE: Resources/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        SWIFT_EMIT_LOC_STRINGS: YES
