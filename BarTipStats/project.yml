name: BarTipStats
options:
  bundleIdPrefix: com.bartipstats
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  SWIFT_VERSION: "5.9"
  TARGETED_DEVICE_FAMILY: "1"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
  CODE_SIGN_STYLE: Manual
  DEVELOPMENT_TEAM: ""

targets:
  BarTipStats:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Models
      - path: ViewModels
      - path: Views
      - path: Services
      - path: Extensions
      - path: Resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.bartipstats.app
      INFOPLIST_FILE: Resources/Info.plist
      TARGETED_DEVICE_FAMILY: "1"
      CODE_SIGN_STYLE: Manual
      DEVELOPMENT_TEAM: ""
      SWIFT_EMIT_LOC_STRINGS: YES
      GENERATE_INFOPLIST_FILE: NO
    info:
      path: Resources/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: "小费统计"
        UIRequiredDeviceCapabilities:
          - arm64
