name: Build BarTipStats

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: BarTipStats

jobs:
  build:
    name: 编译 IPA
    runs-on: macos-14

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 XcodeGen
        run: brew install xcodegen

      - name: 简化 project.yml
        run: |
          cat > project.yml << 'YML'
          name: BarTipStats
          options:
            bundleIdPrefix: com.bartipstats
            deploymentTarget:
              iOS: "17.0"
          settings:
            base:
              SWIFT_VERSION: "5.9"
              TARGETED_DEVICE_FAMILY: "1"
          targets:
            BarTipStats:
              type: application
              platform: iOS
              sources:
                - App
                - Models
                - ViewModels
                - Views
                - Services
                - Extensions
                - Resources/Info.plist
                - Resources/Assets.xcassets
              settings:
                base:
                  PRODUCT_BUNDLE_IDENTIFIER: com.bartipstats.ios
                  INFOPLIST_FILE: Resources/Info.plist
                  CODE_SIGN_STYLE: Manual
                  CODE_SIGNING_REQUIRED: NO
                  CODE_SIGNING_ALLOWED: NO
                  GENERATE_INFOPLIST_FILE: NO
                  ASSETCATALOG_COMPILER_APPICON_NAME: ""
          YML
          echo "✅ project.yml 已简化"

      - name: 生成 Xcode 项目
        run: |
          xcodegen generate 2>&1
          echo "=== 检查生成 ==="
          ls -la *.xcodeproj/ 2>/dev/null || echo "❌ xcodeproj 未生成"
          xcodebuild -list -project ${PROJECT_NAME}.xcodeproj 2>&1

      - name: 编译
        run: |
          xcodebuild \
            -project ${PROJECT_NAME}.xcodeproj \
            -scheme ${PROJECT_NAME} \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1
        timeout-minutes: 15

      - name: 打包 IPA
        run: |
          APP_PATH="DerivedData/Build/Products/Release-iphoneos/${PROJECT_NAME}.app"
          if [ -d "$APP_PATH" ]; then
            echo "✅ 编译成功: $(du -sh "$APP_PATH" | cut -f1)"
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r "${PROJECT_NAME}.ipa" Payload/
            ls -lh *.ipa
          else
            echo "❌ .app 未找到，搜索 DerivedData..."
            find DerivedData -name "*.app" -maxdepth 5 2>/dev/null || echo "未找到"
            exit 1
          fi

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: BarTipStats.ipa
          path: "*.ipa"
          if-no-files-found: error
