# 云编译 → 产出 IPA → 下载后用 Sideloadly 装到 iPhone
# 推送到 GitHub 后自动执行，无需 Mac

name: Build BarTipStats

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: BarTipStats
  # 如果你遇到 "bundle identifier 冲突"，改下面这行
  BUNDLE_ID: com.bartipstats.ios

jobs:
  build:
    name: 编译 IPA
    runs-on: macos-14

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 XcodeGen
        run: brew install xcodegen

      - name: 生成 Xcode 项目（并替换 Bundle ID）
        run: |
          # 把 project.yml 里的 Bundle ID 替换成自定义的
          sed -i '' "s/com.bartipstats.app/${{ env.BUNDLE_ID }}/g" project.yml
          xcodegen generate
          echo "✅ Xcode 项目已生成"

      - name: 编译（跳过签名）
        run: |
          xcodebuild build \
            -project "${PROJECT_NAME}.xcodeproj" \
            -scheme "${PROJECT_NAME}" \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""
        timeout-minutes: 15

      - name: 验证编译产物
        run: |
          APP_PATH="DerivedData/Build/Products/Release-iphoneos/${PROJECT_NAME}.app"
          if [ -d "$APP_PATH" ]; then
            echo "✅ .app 编译成功，大小: $(du -sh "$APP_PATH" | cut -f1)"
            ls -la "$APP_PATH/"
          else
            echo "❌ .app 未生成，编译失败！"
            exit 1
          fi

      - name: 打包为 IPA
        run: |
          mkdir -p Payload
          cp -r "DerivedData/Build/Products/Release-iphoneos/${PROJECT_NAME}.app" Payload/
          zip -r "${PROJECT_NAME}.ipa" Payload/
          echo "✅ IPA 已生成: $(ls -lh ${PROJECT_NAME}.ipa | awk '{print $5}')"

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: BarTipStats.ipa
          path: BarTipStats.ipa
          # 如果产物不存在，让 workflow 明确失败
          if-no-files-found: error
