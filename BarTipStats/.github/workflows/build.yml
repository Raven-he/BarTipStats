# BarTipStats 云编译
# 用法: 推送 main 分支 或 手动触发 workflow_dispatch

name: Build BarTipStats

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: BarTipStats
  BUNDLE_ID: com.bartipstats.ios

jobs:
  build:
    name: 编译 IPA
    runs-on: macos-14

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 XcodeGen
        run: brew install xcodegen

      - name: 替换 Bundle ID
        run: |
          sed -i '' "s/com.bartipstats.app/${{ env.BUNDLE_ID }}/g" project.yml
          echo "✅ Bundle ID -> ${{ env.BUNDLE_ID }}"

      - name: 生成 Xcode 项目
        run: |
          rm -rf BarTipStats.xcodeproj
          xcodegen generate
          echo "✅ xcodeproj 已生成"
          ls -la *.xcodeproj/
          echo "--- 以下为可用 Scheme ---"
          xcodebuild -list -project BarTipStats.xcodeproj

      - name: 编译（不签名）
        run: |
          xcodebuild \
            -project "${PROJECT_NAME}.xcodeproj" \
            -scheme "${PROJECT_NAME}" \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            build 2>&1
        timeout-minutes: 15

      - name: 打包为 IPA
        run: |
          APP_PATH="DerivedData/Build/Products/Release-iphoneos/${PROJECT_NAME}.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ .app 未生成！搜索可能的位置..."
            find DerivedData -name "*.app" -type d 2>/dev/null || echo "未找到任何 .app"
            exit 1
          fi
          echo "✅ 编译成功: $(du -sh "$APP_PATH" | cut -f1)"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r "${PROJECT_NAME}.ipa" Payload/
          echo "✅ IPA: $(ls -lh *.ipa | awk '{print $5}')"

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: BarTipStats.ipa
          path: "*.ipa"
          if-no-files-found: error
